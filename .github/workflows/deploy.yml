name: Deploy to cPanel via FTP

# Auto-deploy: every push to main publishes the site to cPanel hosting via FTPS.
# Requires 4 repo secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR.
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # also runnable manually from the Actions tab

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Upload to hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          # Files that should NOT be uploaded to the live site:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            README.md
            website-concept.md
            **/*.log
