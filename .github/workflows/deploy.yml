name: Deploy to cPanel via FTP

# Auto-deploy: every push to main publishes the site to cPanel (Bluehost) via FTPS.
# Uses lftp because Bluehost's shared FTP cert is *.bluehost.com (doesn't match the
# *.mybluehost.me host), so we keep encryption on but skip the cert-name check.
# Requires 4 repo secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload to hosting via FTPS (lftp mirror)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ftp:passive-mode true;
          set net:timeout 25; set net:max-retries 2; set net:reconnect-interval-base 5;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' 'ftp://$FTP_SERVER';
          echo '>>>PWD'; pwd;
          echo '>>>HOME'; cls -la;
          echo '>>>PUBLIC_HTML'; cls -la public_html;
          echo '>>>DOMAINDIR'; cls -la drjahangirkabir.com;
          echo '>>>PH_DOMAIN'; cls -la public_html/drjahangirkabir.com;
          bye
          "
