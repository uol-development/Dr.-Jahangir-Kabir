name: Deploy to cPanel via FTP

# Auto-deploy on push is DISABLED for now (GitHub only — not publishing to hosting yet).
# To go live later: uncomment the push trigger below and add the FTP_* secrets.
on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:   # run manually from the Actions tab when you're ready to deploy

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Upload to hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          # Files that should NOT be uploaded to the live site:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            README.md
            website-concept.md
            **/*.log
